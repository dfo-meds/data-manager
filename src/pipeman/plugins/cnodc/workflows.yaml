dataset_publication:
  direct_publish:
    enabled: false
  super_user_publish:
    enabled: false
  cnodc_publish:
    label:
      en: CNODC Standard
      fr: Standard de CNDOC
    enabled: true
    steps:
      - lead_publishing_notify
      - lead_approval
      - pub_coord_publishing_notify
      - pub_coord_approval
      - iso19115_metadata_upload_staging
      - iso19139_metadata_upload_staging
      - erddap_iso19115_metadata_upload_staging
      - erddap_metadata_upload_staging
      - erddap_notify_staging
      - sysadmin_publishing_notify
      - sysadmin_approval
      - publish_dataset
      - iso19115_metadata_upload_live
      - iso19139_metadata_upload_live
      - erddap_iso19115_metadata_upload_live
      - erddap_metadata_upload_live
      - erddap_notify_live
  cnodc_direct_publish:
    label:
      en: CNODC Direct Publication
      fr: Publication directe de CNDOC
    steps:
      - interrupt_live_flow
      - iso19115_metadata_upload_staging
      - iso19139_metadata_upload_staging
      - erddap_iso19115_metadata_upload_staging
      - erddap_metadata_upload_staging
      - erddap_notify_staging
      - publish_dataset
      - iso19115_metadata_upload_live
      - iso19139_metadata_upload_live
      - erddap_iso19115_metadata_upload_live
      - erddap_metadata_upload_live
      - erddap_notify_live
      - autopush_notify
    permission: workflow.activate_and_publish
    enabled: true
dataset_activation:
  direct_activation:
    enabled: false
  super_user_activation:
    enabled: false
  activate_and_publish:
    enabled: false
  cnodc_activation:
    label:
      en: CNODC Standard
      fr: Standard de CNDOC
    steps:
      - flag_dataset_for_review
      - pub_coord_activation_notify
      - pub_coord_approval
      - activate_dataset
    cleanup:
      - return_to_draft
    enabled: true
  cnodc_activate_and_publish:
    label:
      en: CNODC Direct Activation & Publication
      fr: Activation et publication directe de CNDOC
    steps:
      - flag_dataset_for_review
      - interrupt_live_flow
      - activate_dataset
      - trigger_publication
    permission: workflow.activate_and_publish
    enabled: true
    cleanup:
      - return_to_draft
