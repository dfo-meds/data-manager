mission:
  fields:
    responsibles:
      data_type: inline_entity_ref
      entity_type: responsibility
      repeatable: yes
      label:
        en: Involved Parties
        fr: Parties impliquées
      description:
        en: Provide any relevant contacts for this mission.
        fr: Veuillez fournir tous les contacts pertinents pour cette mission.
      order: 1000
      json_api:
        mapping: responsibles
instrument:
  fields:
    cnodc_instrument_types:
      data_type: vocabulary
      vocabulary_name: cnodc_instrument_types
      repeatable: yes
      label:
        en: CNODC Instrument Type
        fr: Type d'instrument CNDOC
      description:
        en: Select the instrument type(s) that best describe this instrument.
        fr: Sélectionnez le(s) types d'instruments qui décrivent le mieux cet instrument.
      order: 1000
      json_api:
        mapping: cnodc_instrument_types
    manufacturer:
      data_type: entity_ref
      entity_type: contact
      label:
        en: Manufacturer
        fr: Fabricant
      description:
        en: Select the organization who made this instrument.
        fr: Sélectionnez l'organisation qui a fabriqué cet instrument.
      order: 1010
      json_api:
        mapping: manufacturer
    model_number:
      data_type: text
      label:
        en: Model
        fr: Modèle
      description:
        en: Provide the model of the instrument that was used.
        fr: Veuillez indiquer le modèle de l'instrument utilisé.
      order: 1020
      json_api:
        mapping: model_number
    serial_number:
      data_type: text
      label:
        en: Serial Number
        fr: Numéro de série
      description:
        en: Provide the serial number of the instrument that was used.
        fr: Veuillez indiquer le numéro de série de l'instrument utilisé.
      order: 1030
      json_api:
        mapping: serial_number
