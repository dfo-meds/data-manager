cnodc_role_code:
  display:
    en: CNODC - Internal Roles
    fr: CNDOC - Rôles internes
  uri:
  terms:
    owner:
      display:
        en: Data Owner
        fr: Propriétaire des données
      description:
        en: A person or organization who owns the data and can make decisions about it.
        fr: Une personne ou une organisation qui possède les données et peut prendre des décisions à leur sujet.
    trustee:
      display:
        en: Data Trustee
        fr: Fiduciaire des données
      description:
        en: A person or organization who is ultimately responsible for the dataset.
        fr: Une personne ou une organisation qui est en dernier ressort responsable du jeu de données.
    steward:
      display:
        en: Data Steward
        fr: Gestionnaire de données
      description:
        en: A person who is responsible for the day-to-day management of the data and can be contacted if there are issues with the data.
        fr: Une personne responsable de la gestion quotidienne des données et qui peut être contactée en cas de problèmes avec les données.
    cnodc_lead:
      display:
        en: CNODC Lead
        fr: Responsable de CNDOC
      description:
        en: A person at the CNODC who is responsible for the dataset.
        fr: Une personne au CNDOC qui est responsable du jeu de données.
    expert:
      display:
        en: Expert
        fr: Expert(e)
      description:
        en: A person who can provide support for the data in some form but doesn't fit another role.
        fr: Une personne qui peut fournir un soutien pour les données sous une certaine forme mais qui ne correspond à aucun autre rôle.

